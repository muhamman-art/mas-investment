{% extends "base/base.html" %}
{% block title %}Set New Password — MAS Investment{% endblock %}
{% block body_class %}auth-page{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="brand-icon-lg mx-auto mb-3"><i class="bi bi-shield-lock-fill"></i></div>
      <h4 class="fw-bold mb-1">Set New Password</h4>
      <p class="text-muted small">Choose a strong password for your account</p>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold small">New Password</label>
        <div class="input-group">
          <input type="password" name="password" id="pwd" class="form-control border-end-0" placeholder="Min. 8 characters" required>
          <button type="button" class="input-group-text bg-white border-start-0" onclick="togglePassword('pwd',this)"><i class="bi bi-eye text-muted"></i></button>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small">Confirm Password</label>
        <div class="input-group">
          <input type="password" name="password2" id="pwd2" class="form-control border-end-0" placeholder="Repeat password" required>
          <button type="button" class="input-group-text bg-white border-start-0" onclick="togglePassword('pwd2',this)"><i class="bi bi-eye text-muted"></i></button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-bold"><i class="bi bi-check-circle me-2"></i>Update Password</button>
    </form>
  </div>
</div>
{% endblock %}
{% block footer %}{% endblock %}
